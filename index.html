<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İDT Repertuvar</title>

<style>
body{
  font-family: system-ui, Arial;
  background:#f4efe9;
  margin:0;
}

header{
  background:#7b2d2d;
  color:white;
  padding:14px 20px;
  font-weight:600;
}

#status{
  padding:12px 20px;
  color:#555;
}

.card{
  background:white;
  margin:10px 16px;
  border-radius:12px;
  padding:14px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.title{
  font-weight:700;
  margin-bottom:6px;
}

.meta{
  color:#777;
  font-size:14px;
}
</style>
</head>
<!-- ===== DT APP BAR ===== -->
<header id="appbar">
  <div class="appbar-left">
    <span id="sysStatus" class="dot loading"></span>
    <span id="sysText">Veri bekleniyor…</span>
    <span id="sysCount"></span>
  </div>

  <nav class="appbar-tabs">
    <button data-tab="plays" class="tab active">AKTİF OYUN</button>
    <button data-tab="people" class="tab">TÜM PERSONEL</button>
    <button data-tab="query" class="tab">SORGU</button>
    <button data-tab="conflict" class="tab">ÇAKIŞMALAR</button>
  </nav>

  <div class="appbar-tools">
    <button id="refreshBtn">⟳</button>
    <button id="notifBtn">🔔<span id="notifBadge">0</span></button>
    <button id="excelBtn">📊</button>
    <button id="settingsBtn">⚙</button>
  </div>
</header>
<body>

<header>🎭 Repertuvar Kişi Takip</header>
<div id="status">Veri yükleniyor...</div>
<div id="list"></div>

<script src="app.js"></script>
</body>
</html>
