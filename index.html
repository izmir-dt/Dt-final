<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İDT Repertuvar</title>

<style>
#appbar{
  position:sticky;
  top:0;
  z-index:999;
  height:52px;
  background:#7b1f1f;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  font-family:system-ui;
}

.appbar-left{display:flex;align-items:center;gap:10px;font-size:14px;opacity:.95}

.dot{
  width:10px;height:10px;border-radius:50%;
  background:#999;display:inline-block
}
.dot.ready{background:#22c55e}
.dot.loading{background:#eab308}

.appbar-tabs{display:flex;gap:6px}
.tab{
  background:transparent;border:0;color:#fff;
  padding:6px 12px;border-radius:8px;
  cursor:pointer;font-weight:600;opacity:.85
}
.tab.active{background:rgba(255,255,255,.18);opacity:1}
.tab:hover{background:rgba(255,255,255,.12)}

.appbar-tools{display:flex;gap:8px}
.appbar-tools button{
  background:rgba(255,255,255,.15);
  border:0;border-radius:8px;
  padding:6px 10px;color:white;
  cursor:pointer;font-size:14px
}
.appbar-tools button:hover{background:rgba(255,255,255,.25)}

#notifBadge{
  margin-left:6px;
  background:#facc15;
  color:#000;
  padding:1px 6px;
  border-radius:10px;
  font-size:11px;
  font-weight:700;
}
body{
  font-family: system-ui, Arial;
  background:#f4efe9;
  margin:0;
}

header{
  background:#7b2d2d;
  color:white;
  padding:14px 20px;
  font-weight:600;
}

#status{
  padding:12px 20px;
  color:#555;
}

.card{
  background:white;
  margin:10px 16px;
  border-radius:12px;
  padding:14px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.title{
  font-weight:700;
  margin-bottom:6px;
}

.meta{
  color:#777;
  font-size:14px;
}
</style>
</head>
<!-- ===== DT APP BAR ===== -->
<header id="appbar">
  <div class="appbar-left">
    <span id="sysStatus" class="dot loading"></span>
    <span id="sysText">Veri bekleniyor…</span>
    <span id="sysCount"></span>
  </div>

  <nav class="appbar-tabs">
    <button data-tab="plays" class="tab active">AKTİF OYUN</button>
    <button data-tab="people" class="tab">TÜM PERSONEL</button>
    <button data-tab="query" class="tab">SORGU</button>
    <button data-tab="conflict" class="tab">ÇAKIŞMALAR</button>
  </nav>

  <div class="appbar-tools">
    <button id="refreshBtn">⟳</button>
    <button id="notifBtn">🔔<span id="notifBadge">0</span></button>
    <button id="excelBtn">📊</button>
    <button id="settingsBtn">⚙</button>
  </div>
</header>
<body>

<header>🎭 Repertuvar Kişi Takip</header>
<div id="status">Veri yükleniyor...</div>
<div id="list"></div>

<script src="app.js"></script>
</body>
</html>
<script>
onDataReady(function(rows){
  console.log("DT UI starting with", rows.length, "rows");

  if(window.initPanel) initPanel(rows);
  if(window.initCharts) initCharts(rows);
  if(window.initFiguran) initFiguran(rows);
  if(window.initCompare) initCompare(rows);
});
</script>
